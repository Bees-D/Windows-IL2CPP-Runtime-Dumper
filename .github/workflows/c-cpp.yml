name: Build Dumper

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet Packages
        # Sometimes builds fail because they are missing dependencies
        run: msbuild -t:restore

      - name: Build App
        # We added -verbosity:minimal to see the actual error if it fails
        run: msbuild Il2CppRuntimeDumper.sln /p:Configuration=Release /p:Platform=x64 -verbosity:minimal

      - name: Find and Stage Artifact
        shell: pwsh
        run: |
          $targetName = "Il2CppRuntimeDumper.exe"
          Write-Host "Searching for $targetName..."
          $files = Get-ChildItem -Path . -Filter $targetName -Recurse
          if ($files) {
              New-Item -ItemType Directory -Force -Path .\staging
              foreach ($file in $files) {
                  Write-Host "Found at: $($file.FullName)"
                  Copy-Item $file.FullName -Destination .\staging\
              }
          } else {
              Write-Error "Could not find $targetName. The build likely failed."
              exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Il2CppDumper-Binary
          path: .\staging\
